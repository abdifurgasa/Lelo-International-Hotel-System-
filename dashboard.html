<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Lelo International Hotel</title>
<link rel="stylesheet" href="./css/style.css">
</head>
<body>

<select id="langSelect">
  <option value="en">English</option>
  <option value="am">Amharic</option>
  <option value="om">Oromo</option>
</select>

<header>
  <h1 data-i18n="welcome">Welcome to Lelo International Hotel System</h1>
  <div class="banner-container">
    <div class="banner-slide-container">
      <img src="images/banner1.jpg" class="banner-slide">
    </div>
    <div class="banner-slide-container">
      <img src="images/banner2.jpg" class="banner-slide">
    </div>
    <div class="banner-slide-container">
      <img src="images/banner3.jpg" class="banner-slide">
    </div>
    <div class="banner-slide-container">
      <img src="images/banner4.jpg" class="banner-slide">
    </div>
  </div>
</header>

<nav>
  <button onclick="showPanel('dashboardPanel')">Dashboard</button>
  <button onclick="showPanel('roomsPanel')">Rooms</button>
  <button onclick="showPanel('restaurantPanel')">Restaurant</button>
  <button onclick="logout()">Logout</button>
</nav>

<div id="dashboardPanel" class="panel">Dashboard Content</div>
<div id="roomsPanel" class="panel">Rooms Content</div>
<div id="restaurantPanel" class="panel">Restaurant Content</div>

<script type="module" src="./js/dashboard.js"></script>
<script type="module" src="./js/i18n.js"></script>
</body>
</html>
