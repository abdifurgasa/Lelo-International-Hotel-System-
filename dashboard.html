<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Lelo International Hotel</title>
<link rel="stylesheet" href="./css/style.css">
</head>
<body>

<select id="langSelect">
  <option value="en">English</option>
  <option value="am">Amharic</option>
  <option value="om">Oromo</option>
</select>

<header>
  <h1 data-i18n="welcome">Welcome to Lelo International Hotel System</h1>

  <div class="banner-container">
    <div class="banner-slide-container">
      <img src="images/banner1.jpg" class="banner-slide">
      <div class="banner-text">Your Comfort, Our Priority</div>
    </div>
    <div class="banner-slide-container">
      <img src="images/banner2.jpg" class="banner-slide">
      <div class="banner-text">Experience Excellence</div>
    </div>
    <div class="banner-slide-container">
      <img src="images/banner3.jpg" class="banner-slide">
      <div class="banner-text">Luxury Meets Affordability</div>
    </div>
    <div class="banner-slide-container">
      <img src="images/banner4.jpg" class="banner-slide">
      <div class="banner-text">Stay, Dine, Enjoy</div>
    </div>
  </div>
</header>

<nav>
  <ul>
    <li><button onclick="showPanel('dashboardPanel')">Dashboard</button></li>

    <li>
      <button onclick="toggleSubmenu('roomsSubmenu')">Rooms ▾</button>
      <ul class="submenu" id="roomsSubmenu">
        <li><button onclick="showPanel('roomsPanel')">All Rooms</button></li>
        <li><button onclick="showPanel('addRoomPanel')">Add Room</button></li>
      </ul>
    </li>

    <li>
      <button onclick="toggleSubmenu('restaurantSubmenu')">Restaurant ▾</button>
      <ul class="submenu" id="restaurantSubmenu">
        <li><button onclick="showPanel('restaurantPanel')">Menu</button></li>
        <li><button onclick="showPanel('ordersPanel')">Orders</button></li>
      </ul>
    </li>

    <li><button onclick="showPanel('billingPanel')">Billing</button></li>
    <li><button onclick="showPanel('drinksPanel')">Drinks</button></li>
    <li><button onclick="showPanel('staffPanel')">Staff</button></li>
    <li><button onclick="showPanel('financePanel')">Finance</button></li>
    <li><button class="logout" onclick="logout()">Logout</button></li>
  </ul>
</nav>

<div id="dashboardPanel" class="panel">Dashboard Content</div>
<div id="roomsPanel" class="panel">Rooms Content</div>
<div id="addRoomPanel" class="panel">Add Room Content</div>
<div id="restaurantPanel" class="panel">Restaurant Content</div>
<div id="ordersPanel" class="panel">Orders Content</div>
<div id="billingPanel" class="panel">Billing Content</div>
<div id="drinksPanel" class="panel">Drinks Content</div>
<div id="staffPanel" class="panel">Staff Content</div>
<div id="financePanel" class="panel">Finance Content</div>

<script type="module" src="./js/dashboard.js"></script>
<script type="module" src="./js/i18n.js"></script>
</body>
</html>
